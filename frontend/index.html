<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Our Website</title>
  <style>
    /* Reset some default styles */
    body, h1, p, footer {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background-color: #f4f4f9;
      color: #333;
    }

    /* Navigation bar */
    nav {
      background-color: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }

    nav h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    /* Main content */
    .container {
      padding: 2rem;
      text-align: center;
    }

    .container h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #444;
    }

    .container p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Footer */
    footer {
      background-color: #333;
      color: #fff;
      text-align: center;
      padding: 1rem;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Navigation bar -->
  <nav>
    <h1>Our Website</h1>
  </nav>

  <!-- Main content -->
  <div class="container">
    <h2>Welcome to Glain's Demo Website</h2>
    <p>
      We’re glad you’re here! This is a simple one‑page site designed to greet visitors with a warm welcome note. Explore, enjoy, and feel at home.
    </p>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2026 TGlain. All rights reserved.
  </footer>
</body>
</html>
